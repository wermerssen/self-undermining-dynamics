<svg xmlns="http://www.w3.org/2000/svg" width="260" height="80" viewBox="0 0 260 80">
  <!-- Transparent background -->
  <text x="20" y="50"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="48"
        font-weight="700"
        fill="#ffffff">SUD</text>

  <!-- Red arrow: starts under S, curves under U, ends upward -->
  <path d="M 70 55
           C 95 70, 135 70, 160 55"
        stroke="#cc0000"
        stroke-width="6"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Arrowhead (upward right) -->
  <path d="M 160 55
           L 152 50
           L 162 50 Z"
        fill="#cc0000"/>
</svg>
